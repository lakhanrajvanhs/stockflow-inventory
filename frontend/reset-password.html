<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - StockFlow</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Helper classes for the message box */
    .msg-box { padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .msg-error { background: rgba(229, 62, 62, 0.1); color: #e53e3e; border: 1px solid rgba(229, 62, 62, 0.2); }
    .msg-success { background: rgba(56, 161, 105, 0.1); color: #38a169; border: 1px solid rgba(56, 161, 105, 0.2); }
  </style>
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

  <div class="panel" style="padding: 2.5rem; max-width: 420px; width: 90%;">
    <div class="brand" style="justify-content: center; margin-bottom: 2rem;">
      <div class="brand-mark">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3.2">
          <rect x="8" y="9" width="30" height="22" rx="6"></rect>
          <path d="M14 18h18"></path>
          <path d="M14 24h10"></path>
          <path d="M20 31v8"></path>
          <path d="M28 31v8"></path>
          <path d="M14 39h20"></path>
        </svg>
      </div>
      <h2>StockFlow</h2>
    </div>

    <h3 style="margin-bottom: 1rem; text-align: center;">Set New Password</h3>
    
    <div id="messageBox" class="msg-box" style="display: none;"></div>

    <form id="resetForm">
      <div class="field">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" required placeholder="••••••••" minlength="6">
      </div>
      
      <div class="field" style="margin-top: 1rem;">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required placeholder="••••••••" minlength="6">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; margin-top: 1.5rem;">
        Update Password
      </button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center;">
      <a href="/" style="color: var(--color-primary); text-decoration: none; font-size: 0.9rem;">Back to Login</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Extract the token from the URL (e.g., ?token=XYZ)
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      const resetForm = document.getElementById('resetForm');
      const newPassword = document.getElementById('newPassword');
      const confirmPassword = document.getElementById('confirmPassword');
      const messageBox = document.getElementById('messageBox');
      const submitBtn = document.getElementById('submitBtn');

      // If there's no token in the URL, disable the form immediately
      if (!token) {
        showMessage('Invalid password reset link. Please request a new one from the login page.', 'error');
        resetForm.style.display = 'none';
        return;
      }

      function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = `msg-box msg-${type}`;
        messageBox.style.display = 'block';
      }

      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageBox.style.display = 'none';

        if (newPassword.value !== confirmPassword.value) {
          return showMessage('Passwords do not match.', 'error');
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating...';

        try {
          const res = await fetch('/api/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token: token,
              newPassword: newPassword.value
            })
          });
          
          const data = await res.json();

          if (res.ok) {
            showMessage(data.message, 'success');
            resetForm.style.display = 'none'; // Hide form on success
          } else {
            showMessage(data.error, 'error');
          }
        } catch (err) {
          showMessage('Network error. Please try again.', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
        }
      });
    });
  </script>
</body>
</html>
